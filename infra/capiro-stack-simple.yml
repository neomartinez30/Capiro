AWSTemplateFormatVersion: '2010-09-09'
Description: 'Capiro AWS Infrastructure - Basic Resources'

Resources:
  # DynamoDB Table
  CapiroOrganizationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: capiro-organizations
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          BillingMode: PAY_PER_REQUEST
      BillingMode: PAY_PER_REQUEST

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: capiro-lambda-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt CapiroOrganizationsTable.Arn
                  - !Sub '${CapiroOrganizationsTable.Arn}/index/*'

  # Profile API Lambda Function
  ProfileApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: capiro-profile-api
      Runtime: nodejs20.x
      Handler: index.handler
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              headers: { 'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*' },
              body: JSON.stringify({ message: 'API Gateway connected!', timestamp: new Date().toISOString() })
            };
          };
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref CapiroOrganizationsTable
      Role: !GetAtt LambdaExecutionRole.Arn

Outputs:
  DynamoDBTableName:
    Description: 'DynamoDB Table Name'
    Value: !Ref CapiroOrganizationsTable
  LambdaFunctionName:
    Description: 'Lambda Function Name'
    Value: !Ref ProfileApiLambda